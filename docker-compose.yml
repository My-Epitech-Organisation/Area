version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: area
      POSTGRES_USER: area
      POSTGRES_PASSWORD: area
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      DJANGO_SECRET_KEY: "change_me_for_prod"
      DJANGO_DEBUG: "True"
      POSTGRES_DB: area
      POSTGRES_USER: area
      POSTGRES_PASSWORD: area
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1,server"
      CORS_ALLOWED_ORIGINS: "http://localhost:8081"
      CLIENT_HOST: "localhost:8081"
    ports:
      - "8080:8080"

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    volumes:
      - apk_data:/apk

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - server
      - mobile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://server:8080
    volumes:
      - apk_data:/apk
    ports:
      - "8081:3000"

volumes:
  db_data: {}
  apk_data: {}
